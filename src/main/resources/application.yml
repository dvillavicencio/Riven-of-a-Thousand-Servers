spring:
  data:
    redis:
      port: 6379
      host: redis
  flyway:
    enabled: true
  datasource:
    url: # TODO: Define production parameters
    username: # TODO: Define production parameters
    password: #TODO: Define production parameters
  threads:
    virtual:
      enabled: true

server:
  port: 443
  ssl:
    key-store: keystore.pfx
    key-store-type: PKCS12
    key-store-password: ${KEYSTORE_PASSWORD}

bungie:
  api:
    apiKey: ${BUNGIE_API_KEY}
    clientSecret: ${BUNGIE_CLIENT_SECRET}
    clientId: ${BUNGIE_CLIENT_ID}
    baseUrl: https://www.bungie.net/Platform
    statsBaseUrl: https://stats.bungie.net/Platform
    authorizationUrl: https://www.bungie.net/en/oauth/authorize
    callbackUrl: ${application.callback.url}/bungie/callback

discord:
  api:
    version: 10
    baseUrl: https://discord.com/api
    callbackUrl: ${application.callback.url}/discord/callback
    authorizationUrl: https://discord.com/oauth2/authorize
    botToken: ${DISCORD_BOT_TOKEN}
    botPublicKey: ${DISCORD_BOT_PUBLIC_KEY}
    clientId: ${DISCORD_CLIENT_ID}
    clientSecret: ${DISCORD_CLIENT_SECRET}
    scopes: identify

application:
  callback:
    url: https://d2discord.app
